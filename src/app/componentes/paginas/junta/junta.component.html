
<div class="table-css">
    <div class="junta">
        <h1>JUNTA DIRECTIVA</h1>
        <div class="year">
            <label for="yearSelect">Año:</label>
            <app-selector
                [options]="availableYears"
                [selected]="selectedYear"
                (selectionChange)="onYearChange($event)">
            </app-selector>
        </div>
    </div>
    <div class="section">
        <table class="table table-striped table-bordered ">
            <thead>
                <tr>
                <th class="center-vert mostaza borde" scope="col">Cargo</th>
                <th class="center-vert mostaza borde" scope="col">Nombre y Apellidos</th>
                </tr>
            </thead>
            <tbody class="borde">
                <ng-container *ngIf="filteredJunta && filteredJunta.length > 0">
                    <ng-container *ngFor="let miembro of filteredJunta">
                        <tr>
                            <td class="center-vert">Presidencia</td>
                            <td class="center-vert">{{ miembro.Presidente }}</td>
                        </tr>
                         <tr *ngIf="miembro.Vicepresidente">
                            <td class="center-vert">Vicepresidencia</td>
                            <td class="center-vert">{{ miembro.Vicepresidente }}</td>
                        </tr>
                        <tr>
                            <td class="center-vert">Secretaría</td>
                            <td class="center-vert">{{ miembro.Secretaria }}</td>
                        </tr>
                        <tr>
                            <td class="center-vert">Tesorería</td>
                            <td class="center-vert">{{ miembro.Tesoreria }}</td>
                        </tr>
                        <ng-container *ngIf="getVocales(miembro).length > 0">
                            <tr *ngFor="let vocal of getVocales(miembro); let i = index">
                                <td class="center-vert" *ngIf="i === 0" [attr.rowspan]="getVocales(miembro).length">
                                    Vocalías
                                </td>
                                <td class="center-vert">{{ vocal }}</td>
                            </tr>
                        </ng-container>
                    </ng-container>
                </ng-container>
            </tbody>
        </table>
    </div>
</div>
